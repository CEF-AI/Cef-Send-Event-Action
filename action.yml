name: "CEF Send Event"
description: "Send a CEF event with arbitrary type and payload via the SDK"
branding:
  icon: "send"
  color: "blue"

inputs:
  wallet_uri:
    description: "CEF wallet URI (Ed25519 signer)"
    required: true
  ddc_base_url:
    description: "DDC Base URL"
    required: true
  agent_service:
    description: "Agent service public key"
    required: true
  workspace:
    description: "Workspace ID"
    required: true
  stream:
    description: "Stream ID"
    required: false
    default: ""
  event_type:
    description: "CEF event type identifier"
    required: true
  event_payload:
    description: "JSON string for the event body (e.g. from toJSON(github.event) or a custom object)"
    required: false
    default: "{}"

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install dependencies
      shell: bash
      run: npm install --prefix ${{ github.action_path }}

    - name: Send event to CEF
      shell: bash
      env:
        WALLET_URI: ${{ inputs.wallet_uri }}
        DDC_BASE_URL: ${{ inputs.ddc_base_url }}
        AGENT_SERVICE: ${{ inputs.agent_service }}
        WORKSPACE: ${{ inputs.workspace }}
        STREAM: ${{ inputs.stream }}
        EVENT_TYPE: ${{ inputs.event_type }}
        EVENT_PAYLOAD: ${{ inputs.event_payload }}
      run: node ${{ github.action_path }}/index.mjs
