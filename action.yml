name: "CEF Send Event"
description: "Send a CEF event with arbitrary type and payload via the SDK"
branding:
  icon: "send"
  color: "blue"

inputs:
  wallet_uri:
    description: "Legacy SDK mode only: CEF wallet URI (Ed25519 signer)"
    required: false
    default: ""
  ddc_base_url:
    description: "Legacy SDK mode only: CEF orchestrator base URL"
    required: false
    default: ""
  gar_url:
    description: "GAR service URL"
    required: false
    default: "https://gar.compute.test.ddcdragon.com/"
  event_runtime_url:
    description: "Event runtime URL"
    required: false
    default: "https://events.compute.test.ddcdragon.com"
  agent_runtime_url:
    description: "Agent runtime URL"
    required: false
    default: "https://agent.compute.test.ddcdragon.com"
  web_transport_url:
    description: "WebTransport endpoint URL"
    required: false
    default: "https://agent.compute.test.ddcdragon.com:4433"
  sis_url:
    description: "SIS service URL"
    required: false
    default: "https://sis.compute.test.ddcdragon.com"
  agent_service:
    description: "Agent service public key"
    required: false
    default: "0x32782e0045c83a1ab2c14d88c71b919ffb6ffef9a228bebb7c73f563d611f213"
  workspace:
    description: "Workspace ID"
    required: false
    default: "2221"
  stream:
    description: "Stream ID"
    required: false
    default: "stream-d5b026ae"
  event_type:
    description: "CEF event type identifier"
    required: true
  event_payload:
    description: "JSON string for the event body (e.g. from toJSON(github.event) or a custom object)"
    required: false
    default: "{}"
  github_token:
    description: "GitHub token for central sender validation"
    required: false
    default: ""
  gemini_api_key:
    description: "Gemini API key to include in the event payload"
    required: false
    default: ""
  agreement_ttl_seconds:
    description: "Agreement TTL in seconds before sending the event"
    required: false
    default: "86400"
  sender_mode:
    description: "auto sends GitHub tracker events to central_sender_url or Vault when configured, otherwise legacy. Use central, vault, or legacy to force one path."
    required: false
    default: "auto"
  central_sender_url:
    description: "Optional central CEF GitHub sender endpoint. Set this default in the action release to enable central mode without changing caller workflows."
    required: false
    default: ""
  central_sender_timeout_seconds:
    description: "Maximum time to wait for the central sender HTTP request."
    required: false
    default: "240"
  vault_url:
    description: "Vault API URL for Vault SDK mode"
    required: false
    default: ""
  marketplace_url:
    description: "Agent Marketplace URL for Vault SDK mode"
    required: false
    default: ""
  s3_gateway_auth_info_url:
    description: "S3 Gateway auth/info URL for Vault SDK mode"
    required: false
    default: ""
  scope:
    description: "Vault scope for Vault SDK mode"
    required: false
    default: ""
  vault_agent_id:
    description: "Full Vault AgentConnection target id"
    required: false
    default: ""
  vault_agent_alias:
    description: "Agent alias to resolve when vault_agent_id is omitted"
    required: false
    default: ""
  vault_cubby_alias:
    description: "Cubby alias to resolve when vault_agent_id is omitted"
    required: false
    default: ""
  wallet_keystore_b64:
    description: "Base64-encoded Vault wallet keystore JSON"
    required: false
    default: ""
  wallet_keystore_json:
    description: "Vault wallet keystore JSON string"
    required: false
    default: ""
  wallet_keystore_password:
    description: "Vault wallet keystore password"
    required: false
    default: ""
  wallet_mnemonic:
    description: "Vault wallet mnemonic"
    required: false
    default: ""
  wallet_seed_hex:
    description: "Vault wallet seed hex"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "24"

    - name: Install dependencies
      shell: bash
      run: npm install --prefix ${{ github.action_path }}

    - name: Send event to CEF
      shell: bash
      env:
        INPUT_WALLET_URI: ${{ inputs.wallet_uri }}
        INPUT_BASE_URL: ${{ inputs.ddc_base_url }}
        INPUT_GAR_URL: ${{ inputs.gar_url }}
        INPUT_EVENT_URL: ${{ inputs.event_runtime_url }}
        INPUT_AGENT_RUNTIME_URL: ${{ inputs.agent_runtime_url }}
        INPUT_WEB_TRANSPORT_URL: ${{ inputs.web_transport_url }}
        INPUT_SIS_URL: ${{ inputs.sis_url }}
        INPUT_AGENT_SERVICE: ${{ inputs.agent_service }}
        INPUT_WORKSPACE: ${{ inputs.workspace }}
        INPUT_STREAM: ${{ inputs.stream }}
        INPUT_EVENT_TYPE: ${{ inputs.event_type }}
        INPUT_EVENT_PAYLOAD: ${{ inputs.event_payload }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
        INPUT_AGREEMENT_TTL_SECONDS: ${{ inputs.agreement_ttl_seconds }}
        INPUT_SENDER_MODE: ${{ inputs.sender_mode }}
        INPUT_CENTRAL_SENDER_URL: ${{ inputs.central_sender_url }}
        INPUT_CENTRAL_SENDER_TIMEOUT_SECONDS: ${{ inputs.central_sender_timeout_seconds }}
        INPUT_VAULT_URL: ${{ inputs.vault_url }}
        INPUT_MARKETPLACE_URL: ${{ inputs.marketplace_url }}
        INPUT_S3_GATEWAY_AUTH_INFO_URL: ${{ inputs.s3_gateway_auth_info_url }}
        INPUT_SCOPE: ${{ inputs.scope }}
        INPUT_VAULT_AGENT_ID: ${{ inputs.vault_agent_id }}
        INPUT_VAULT_AGENT_ALIAS: ${{ inputs.vault_agent_alias }}
        INPUT_VAULT_CUBBY_ALIAS: ${{ inputs.vault_cubby_alias }}
        INPUT_WALLET_KEYSTORE_B64: ${{ inputs.wallet_keystore_b64 }}
        INPUT_WALLET_KEYSTORE_JSON: ${{ inputs.wallet_keystore_json }}
        INPUT_WALLET_KEYSTORE_PASSWORD: ${{ inputs.wallet_keystore_password }}
        INPUT_WALLET_MNEMONIC: ${{ inputs.wallet_mnemonic }}
        INPUT_WALLET_SEED_HEX: ${{ inputs.wallet_seed_hex }}
      run: node ${{ github.action_path }}/index.mjs
