name: "CEF Send Event"
description: "Send a CEF event with arbitrary type and payload via the SDK"
branding:
  icon: "send"
  color: "blue"

inputs:
  wallet_uri:
    description: "CEF wallet URI (Ed25519 signer)"
    required: true
  ddc_base_url:
    description: "CEF orchestrator base URL"
    required: true
  gar_url:
    description: "GAR service URL"
    required: false
    default: "https://gar.compute.test.ddcdragon.com/"
  event_runtime_url:
    description: "Event runtime URL"
    required: false
    default: "https://events.compute.test.ddcdragon.com"
  agent_runtime_url:
    description: "Agent runtime URL"
    required: false
    default: "https://agent.compute.test.ddcdragon.com"
  web_transport_url:
    description: "WebTransport endpoint URL"
    required: false
    default: "https://agent.compute.test.ddcdragon.com:4433"
  sis_url:
    description: "SIS service URL"
    required: false
    default: "https://sis.compute.test.ddcdragon.com"
  agent_service:
    description: "Agent service public key"
    required: false
    default: "0x32782e0045c83a1ab2c14d88c71b919ffb6ffef9a228bebb7c73f563d611f213"
  workspace:
    description: "Workspace ID"
    required: false
    default: "2221"
  stream:
    description: "Stream ID"
    required: false
    default: "stream-d5b026ae"
  event_type:
    description: "CEF event type identifier"
    required: true
  event_payload:
    description: "JSON string for the event body (e.g. from toJSON(github.event) or a custom object)"
    required: false
    default: "{}"
  gemini_api_key:
    description: "Gemini API key to include in the event payload"
    required: false
    default: ""
  agreement_ttl_seconds:
    description: "Agreement TTL in seconds before sending the event"
    required: false
    default: "86400"

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "24"

    - name: Install dependencies
      shell: bash
      run: npm install --prefix ${{ github.action_path }}

    - name: Send event to CEF
      shell: bash
      env:
        WALLET_URI: ${{ inputs.wallet_uri }}
        BASE_URL: ${{ inputs.ddc_base_url }}
        GAR_URL: ${{ inputs.gar_url }}
        EVENT_URL: ${{ inputs.event_runtime_url }}
        AGENT_RUNTIME_URL: ${{ inputs.agent_runtime_url }}
        WEB_TRANSPORT_URL: ${{ inputs.web_transport_url }}
        SIS_URL: ${{ inputs.sis_url }}
        AGENT_SERVICE: ${{ inputs.agent_service }}
        WORKSPACE: ${{ inputs.workspace }}
        STREAM: ${{ inputs.stream }}
        EVENT_TYPE: ${{ inputs.event_type }}
        EVENT_PAYLOAD: ${{ inputs.event_payload }}
        GEMINI_API_KEY: ${{ inputs.gemini_api_key || secrets.GEMINI_API_KEY }}
        AGREEMENT_TTL_SECONDS: ${{ inputs.agreement_ttl_seconds }}
      run: node ${{ github.action_path }}/index.mjs
